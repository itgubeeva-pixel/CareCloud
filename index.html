<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareCloud</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>

    <header>
        <div class="container">
            <div class="logo">☁️ CareCloud</div>
            <nav>
                <a href="#articles">Статьи</a>
                <a href="#videos">Видео</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Забота о себе<br>каждый день</h1>
            <p>Статьи и видео для душевного равновесия</p>
        </div>
    </section>

    <section id="articles" class="section">
        <div class="container">
            <h2>Статьи</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="психология">Психология</button>
                <button class="filter-btn" data-filter="саморазвитие">Саморазвитие</button>
                <button class="filter-btn" data-filter="здоровье">Здоровье</button>
            </div>
            <div class="grid" id="articlesGrid"></div>
        </div>
    </section>

    <section id="videos" class="section">
        <div class="container">
            <h2>Видео</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter-video="all">Все</button>
                <button class="filter-btn" data-filter-video="медитация">Медитация</button>
                <button class="filter-btn" data-filter-video="йога">Йога</button>
            </div>
            <div class="grid" id="videosGrid"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 CareCloud</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
